# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  PROJECT_NAME: RoleSystemDemo

tasks:
  default:
    cmds:
      - task --list
    desc: Show available tasks
    silent: true

  run:
    cmds:
      - dotnet run --project ./{{.PROJECT_NAME}}/{{.PROJECT_NAME}}.csproj
    desc: Run the application in Debug mode
    silent: true

  build:
    cmds:
      - dotnet build
    desc: Build the application
    silent: true

  clean:
    cmds:
      - dotnet clean
    desc: Clean the build artifacts
    silent: true

  publish:
    cmds:
      - >
        pwsh.exe -NoProfile -NoLogo -Command
        "if (Test-Path -Path './publish') {
          Remove-Item -Path './publish' -Recurse -Force
        }"
      - >
        dotnet publish ./{{.PROJECT_NAME}}/{{.PROJECT_NAME}}.csproj
        -c Release -o ./publish
        -p:SelfContained=false
        -p:PublishSingleFile=true
    desc: Publish the application for deployment
    silent: true
